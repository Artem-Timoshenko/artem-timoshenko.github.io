<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page.title | default: site.title }}</title>

  {%- seo -%}
  {%- feed_meta -%}

  <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&display=swap"
  />

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
</head>

<body>
  <div class="page" id="top">

    <header class="masthead">
      <div class="masthead-inner">
        <nav class="masthead-nav" aria-label="Primary">
          <a href="#about">About</a>
          <a href="#research">Research</a>
          <a href="#consulting">Consulting</a>
          <a href="#teaching">Teaching</a>
          <a href="#honors">Honors</a>
          <a href="{{ site.data.profile.cv | relative_url }}" target="_blank" rel="noopener">CV</a>
        </nav>
      </div>
    </header>

    <main class="page-inner">
      {{ content }}
    </main>

    <footer class="colophon">
      <div>{{ site.data.profile.name }} · {{ site.data.profile.location }}</div>
      <div>{{ site.data.profile.year_start }}–{{ site.time | date: '%Y' }}</div>
    </footer>

  </div>
</body>
</html>
