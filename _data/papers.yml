- year: 2025
  status: pub
  title: "A Sample Size Calculation for Training and Certifying Targeting Policies"
  authors:
    - "Duncan Simester"
    - "Artem Timoshenko"
    - "Spyros I. Zoumpoulis"
  venue: "Management Science, 71(11), 8995–9868"
  tldr: >-
    Marketers often run field experiments without knowing how much data they
    need for designing targeting policies. This paper provides guidance for
    the sample-size calculations for both training a policy and certifying it
    before deployment.
