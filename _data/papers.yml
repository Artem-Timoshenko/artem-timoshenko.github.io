- year: 2026
  status: wp
  title: "Policy-Aligned Estimation of Conditional Average Treatment Effects"
  authors:
    - "Artem Timoshenko"
    - "Caio Waisman"
  venue: "Under review"
  tldr: >-
    A new framework for estimating CATEs by focusing on the downstream
    targeting decisions rather than statistical fit alone. We show that
    standard "plug-in optimization" and "direct policy learning" are not
    competing paradigms, but limiting cases of the same optimization problem.
  links:
    pdf: "/assets/papers/Policy-Aligned CATEs Dec 2025.pdf"
    ssrn: ""

